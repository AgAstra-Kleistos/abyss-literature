spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/north_abyss?serverTimezone=Asia/Shanghai
    username: root
    password: Sc@mysql

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 打印SQL
  global-config:
    db-config:
      id-type: auto  # 主键自增

logging:
  level:
    com:
      sky:
        mapper: debug
        service: info
        controller: info

abyss:
  jwt:
    # 设置jwt签名加密时使用的秘钥
    admin-secret-key: itcast
    # 设置jwt过期时间
    admin-ttl: 7200000
    # 设置前端传递过来的令牌名称
    admin-token-name: token
